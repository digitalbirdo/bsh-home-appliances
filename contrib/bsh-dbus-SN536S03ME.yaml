# ==============================================================
#
# This is verified to work with a SN536S03ME/28 connected via DBUS port at the control panel
# 3 pins on the right side on the top
# GND, DATA, VCC from left to right
#
# ==============================================================

esphome:
  name: bsh-dbus-SN536S03ME
  friendly_name: BSH SN536S03ME
 
external_components:
  - source: github://digitalbirdo/bsh-home-appliances@master
    refresh: 0s

esp32:
  board: esp32-c6-devkitc-1  
  variant: esp32c6
  framework:
    type: esp-idf
    
logger:
  level: VERY_VERBOSE

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80
  version: 2
  local: true

output:
  - platform: gpio
    pin: 
      number: GPIO07
      inverted: true
    id: activity_led

uart:
  id: dbus_uart
  rx_pin: GPIO4
  tx_pin: GPIO5
  baud_rate: 9600

bshdbus:
  id: bsh_dbus
  uart_id: dbus_uart
  on_frame:
    - logger.log:
        format: "Received frame dest 0x%02x cmd 0x%04x: 0x%s"
        args: [dest, command, format_hex(message).c_str()]
    - output.turn_on: activity_led
    - delay: 20ms
    - output.turn_off: activity_led

status_led:
  pin:
    number: GPIO06
    inverted: true

binary_sensor:
  - platform: bshdbus
    dest: 0x24
    command: 0x2006
    binary_sensors:
      - id: bsh_dw_rinse_aid
        name: Rinse Aid
        icon: mdi:glass-cocktail
        lambda: return (x[0] >> 1) & 0x01;
      - id: bsh_dw_salt
        name: Salt
        icon: mdi:shaker-outline
        lambda: return (x[0] >> 0) & 0x01;
      - id: bsh_dw_door
        name: Door
        device_class: door
        lambda: return !((x[0] >> 3) & 0x01);

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: Uptime 
  - platform: bshdbus
    dest: 0x25
    command: 0x2008
    sensors:
      - id: bsh_dw_remain
        name: Remaining Time
        device_class: duration
        state_class: measurement
        unit_of_measurement: min
        accuracy_decimals: 0
        lambda: return x[0];

text_sensor:
  - platform: bshdbus
    dest: 0x17
    command: 0x1011
    text_sensors:
      - id: bsh_dw_mode
        name: Mode
        icon: mdi:knob
        lambda: |-
          if (x[0] == 0x0a){
            return "Heavy 70°";
          } else if (x[0] == 0x0d){
            return "Auto 45°-65°";
          } else if (x[0] == 0x0e){
            return "Eco 50°";
          } else if (x[0] == 0x0f){
            return "Normal 40°";
          } else if (x[0] == 0x15){
            return "Speed 65°";
          } else if (x[0] == 0x12){
            return "Rinse";
          }
          return "Eco 50°";

# Write examples - demonstrates D-Bus writing functionality
button:
  # Example 1: Start/Pause the washing program
  - platform: template
    name: Start Program
    icon: mdi:play-pause
    on_press:
      - bshdbus.write:
          id: bsh_dbus
          dest: 0x17
          command: 0x1013
          data: [0x01]
      - logger.log: "Sent Start command to Dishwasher"
  
  # Example 2: Set temperature to 40°C
  - platform: template
    name: Set Heavy 70°C
    icon: mdi:thermometer
    on_press:
      - bshdbus.write:
          id: bsh_dbus
          dest: 0x17
          command: 0x1010
          data: [0x0a]  # 0x0a = 70°C heavy
      - logger.log: "Sent Heavy 70°C command"
  - platform: template
    name: Set Auto 45°-65
    icon: mdi:thermometer
    on_press:
      - bshdbus.write:
          id: bsh_dbus
          dest: 0x17
          command: 0x1010
          data: [0x0d]  # 0x0a = Auto 45°-65
      - logger.log: "Sent Auto 45°-65 command"

# Example 7: Dropdown/select that maps user-visible strings to bytes
select:
  - platform: template
    name: Custom Program Select
    icon: mdi:format-list-bulleted
    options:
      - "Heavy 70°C"
      - "Auto 45°-65°"
    optimistic: true
    set_action:
      - bshdbus.write:
          id: bsh_dbus
          dest: 0x17
          command: 0x1010
          data: !lambda |-
            if (x == "Heavy 70°C") return std::vector<uint8_t>{0x0a};
            if (x == "uto 45°-65°") return std::vector<uint8_t>{0x0d};
            return std::vector<uint8_t>{0x00};
      - logger.log:
          format: "Selected program '%s' and wrote corresponding byte"
          args: ['x']
